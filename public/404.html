<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <script>
    // SPA fallback: redirect 404s to the main app with the path preserved
    // This allows React Router to show a proper 404 page
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Skip if already at root
      if (path === '/') return;
      
      // Redirect to the SPA root with the path encoded
      // This lets React Router show a proper 404 page
      var redirectUrl = '/?redirect=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
